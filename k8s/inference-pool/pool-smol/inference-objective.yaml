# InferenceObjective - SmolLM Pool 우선순위 정의
# targetModels로 이 objective가 적용될 모델 지정

apiVersion: inference.networking.x-k8s.io/v1alpha2
kind: InferenceObjective
metadata:
  name: vllm-smol-objective
  namespace: default
spec:
  priority: 10
  poolRef:
    name: vllm-smol
  targetModels:
    - name: HuggingFaceTB/SmolLM2-1.7B-Instruct
