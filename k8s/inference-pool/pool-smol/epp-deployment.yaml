apiVersion: v1
kind: Service
metadata:
  name: vllm-smol-epp
  namespace: default
spec:
  selector:
    app: vllm-smol-epp
  ports:
    - protocol: TCP
      port: 9002
      targetPort: 9002
      appProtocol: http2
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-smol-epp
  namespace: default
  labels:
    app: vllm-smol-epp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-smol-epp
  template:
    metadata:
      labels:
        app: vllm-smol-epp
    spec:
      serviceAccountName: vllm-smol-epp
      terminationGracePeriodSeconds: 130
      containers:
        - name: epp
          image: registry.k8s.io/gateway-api-inference-extension/epp:v1.3.1
          imagePullPolicy: IfNotPresent
          args:
            - --pool-name=vllm-smol
            - --pool-namespace=default
            - --v=4
            - --zap-encoder=json
            - --grpc-port=9002
            - --grpc-health-port=9003
            - --config-file=/config/default-plugins.yaml
          ports:
            - containerPort: 9002
              name: grpc
            - containerPort: 9003
              name: grpc-health
            - containerPort: 9090
              name: metrics
          livenessProbe:
            grpc:
              port: 9003
              service: inference-extension
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            grpc:
              port: 9003
              service: inference-extension
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: plugins-config-volume
              mountPath: /config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: plugins-config-volume
          configMap:
            name: plugins-config-smol
