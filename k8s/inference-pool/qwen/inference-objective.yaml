# InferenceObjective defines SLO targets for the inference pool.
# Required for EPP to emit inference_objective_* metrics (NTPOT, token throughput, etc.)
# See: https://github.com/kubernetes-sigs/gateway-api-inference-extension/blob/v1.3.1/config/manifests/inferenceobjective.yaml
apiVersion: inference.networking.x-k8s.io/v1alpha2
kind: InferenceObjective
metadata:
  name: qwen-base
  namespace: default
spec:
  priority: 1
  poolRef:
    group: inference.networking.k8s.io
    name: vllm-qwen
