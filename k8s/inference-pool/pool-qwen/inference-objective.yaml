# InferenceObjective - Qwen Pool 우선순위 정의
# targetModels로 이 objective가 적용될 모델 지정

apiVersion: inference.networking.x-k8s.io/v1alpha2
kind: InferenceObjective
metadata:
  name: vllm-qwen-objective
  namespace: default
spec:
  priority: 10
  poolRef:
    name: vllm-qwen
  targetModels:
    - name: Qwen/Qwen3-0.6B
