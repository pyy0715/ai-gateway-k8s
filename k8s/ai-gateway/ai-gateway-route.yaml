apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: AIGatewayRoute
metadata:
  name: ai-gateway-route
  namespace: default
spec:
  parentRefs:
    - name: ai-gateway
      kind: Gateway
      group: gateway.networking.k8s.io
  rules:
    # Qwen/Qwen3-0.6B
    - matches:
        - headers:
            - type: Exact
              name: x-ai-eg-model
              value: Qwen/Qwen3-0.6B
      backendRefs:
        - group: inference.networking.k8s.io
          kind: InferencePool
          name: vllm-qwen

    # HuggingFaceTB/SmolLM2-1.7B-Instruct
    - matches:
        - headers:
            - type: Exact
              name: x-ai-eg-model
              value: HuggingFaceTB/SmolLM2-1.7B-Instruct
      backendRefs:
        - group: inference.networking.k8s.io
          kind: InferencePool
          name: vllm-smol

    # Default
    - backendRefs:
        - group: inference.networking.k8s.io
          kind: InferencePool
          name: vllm-qwen
