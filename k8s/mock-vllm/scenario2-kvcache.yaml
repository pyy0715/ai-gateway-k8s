# Scenario 2: KV-cache based routing
# slow pod는 kv_cache_base=0.90으로 고정 → EPP가 fast pod 선호
# EPP가 보는 메트릭: vllm:kv_cache_usage_perc

apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-mock-kvcache-slow
  namespace: default
  labels:
    app: vllm-qwen
    scenario: kvcache
    speed: slow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-qwen
      scenario: kvcache
      speed: slow
  template:
    metadata:
      labels:
        app: vllm-qwen
        scenario: kvcache
        speed: slow
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: vllm-mock
          image: mock-vllm:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MOCK_VLLM_MODEL_NAME
              value: "Qwen/Qwen3-0.6B"
            - name: MOCK_VLLM_TTFT_BASE_MS
              value: "100"
            - name: MOCK_VLLM_ITL_BASE_MS
              value: "50"
            - name: MOCK_VLLM_KV_CACHE_BASE
              value: "0.90"   # 높은 KV-cache → EPP가 기피
            - name: MOCK_VLLM_KV_CACHE_PER_REQUEST
              value: "0.02"
            - name: MOCK_VLLM_MAX_CONCURRENT
              value: "5"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-mock-kvcache-fast
  namespace: default
  labels:
    app: vllm-qwen
    scenario: kvcache
    speed: fast
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-qwen
      scenario: kvcache
      speed: fast
  template:
    metadata:
      labels:
        app: vllm-qwen
        scenario: kvcache
        speed: fast
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: vllm-mock
          image: mock-vllm:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MOCK_VLLM_MODEL_NAME
              value: "Qwen/Qwen3-0.6B"
            - name: MOCK_VLLM_TTFT_BASE_MS
              value: "100"
            - name: MOCK_VLLM_ITL_BASE_MS
              value: "50"
            - name: MOCK_VLLM_KV_CACHE_BASE
              value: "0.10"   # 낮은 KV-cache → EPP가 선호
            - name: MOCK_VLLM_KV_CACHE_PER_REQUEST
              value: "0.02"
            - name: MOCK_VLLM_MAX_CONCURRENT
              value: "5"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 2
            periodSeconds: 5
