      "templating": {"list": []},
      "time": {"from": "now-15m", "to": "now"},
      "timepicker": {},
      "timezone": "",
      "title": "EPP Smart Routing Dashboard",
      "uid": "epp-smart-routing",
      "version": 1,
      "weekStart": ""
