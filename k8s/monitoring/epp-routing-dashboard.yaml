# EPP Smart Routing Dashboard
# Minimal dashboard aligned to project success criteria:
#   3. Grafana에서 vllm:gpu_cache_usage_perc, inference_pool_average_kv_cache_utilization,
#      inference_pool_average_queue_size 가 비제로로 표시됨
#   4. 두 팟 간 라우팅 분포가 불균등하게 나타남 (EPP 스마트 라우팅 증거)

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-epp-routing
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  epp-routing.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
          "id": 1,
          "panels": [],
          "title": "Health & Pool Status (Success Criteria 3)",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "thresholds"}, "decimals": 0, "unit": "short"},
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 1},
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}
          },
          "targets": [
            {"expr": "count(up{job=\"epp-metrics\"} == 1)", "refId": "A"}
          ],
          "title": "EPP Up",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "thresholds"}, "decimals": 0, "unit": "short"},
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 4, "x": 4, "y": 1},
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 1}, {"color": "green", "value": 2}]}
          },
          "targets": [
            {"expr": "inference_pool_ready_pods", "refId": "A"}
          ],
          "title": "Ready Pods",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "description": "성공 기준 3: vllm:gpu_cache_usage_perc 가 비제로인지 확인",
          "fieldConfig": {
            "defaults": {"color": {"mode": "thresholds"}, "decimals": 1, "unit": "percentunit"},
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 5, "x": 8, "y": 1},
          "id": 4,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.7}, {"color": "red", "value": 0.9}]}
          },
          "targets": [
            {"expr": "avg(vllm:gpu_cache_usage_perc)", "refId": "A"}
          ],
          "title": "GPU KV Cache Usage",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "description": "성공 기준 3: inference_pool_average_kv_cache_utilization 가 비제로인지 확인",
          "fieldConfig": {
            "defaults": {"color": {"mode": "thresholds"}, "decimals": 1, "unit": "percentunit"},
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 5, "x": 13, "y": 1},
          "id": 5,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.7}, {"color": "red", "value": 0.9}]}
          },
          "targets": [
            {"expr": "avg(inference_pool_average_kv_cache_utilization)", "refId": "A"}
          ],
          "title": "Pool Avg KV Cache",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "description": "성공 기준 3: inference_pool_average_queue_size 가 비제로인지 확인",
          "fieldConfig": {
            "defaults": {"color": {"mode": "thresholds"}, "decimals": 1, "unit": "short"},
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 1},
          "id": 6,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 10}, {"color": "red", "value": 50}]}
          },
          "targets": [
            {"expr": "avg(inference_pool_average_queue_size)", "refId": "A"}
          ],
          "title": "Pool Avg Queue Size",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 5},
          "id": 10,
          "panels": [],
          "title": "EPP Smart Routing — Per Pod (Success Criteria 4)",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "description": "팟별 GPU KV Cache 사용률. 부하 시 팟 간 차이가 있어야 EPP가 이를 기반으로 라우팅합니다.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisColorMode": "text",
                "axisLabel": "KV Cache %",
                "axisPlacement": "auto",
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "none",
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": true,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "off"}
              },
              "decimals": 1,
              "max": 1,
              "min": 0,
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 6},
          "id": 11,
          "options": {
            "legend": {"calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true},
            "tooltip": {"mode": "multi", "sort": "none"}
          },
          "targets": [
            {"expr": "vllm:gpu_cache_usage_perc", "legendFormat": "{{pod}}", "refId": "A"}
          ],
          "title": "KV Cache Utilization per Pod",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "description": "팟별 실행 중/대기 중 요청 수. EPP는 큐가 짧은 팟을 선호합니다.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisColorMode": "text",
                "axisLabel": "Requests",
                "axisPlacement": "auto",
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "none",
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": true,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "off"}
              },
              "decimals": 0,
              "min": 0,
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 6},
          "id": 12,
          "options": {
            "legend": {"calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true},
            "tooltip": {"mode": "multi", "sort": "none"}
          },
          "targets": [
            {"expr": "vllm:num_requests_running", "legendFormat": "running — {{pod}}", "refId": "A"},
            {"expr": "vllm:num_requests_waiting", "legendFormat": "waiting — {{pod}}", "refId": "B"}
          ],
          "title": "Running & Waiting Requests per Pod",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 14},
          "id": 20,
          "panels": [],
          "title": "Routing Distribution (Success Criteria 4)",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "description": "팟별 초당 완료된 요청 수. EPP가 KV cache/큐 상태에 따라 라우팅하면 팟 간 차이가 발생합니다.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisColorMode": "text",
                "axisLabel": "Req/sec",
                "axisPlacement": "auto",
                "drawStyle": "line",
                "fillOpacity": 20,
                "gradientMode": "none",
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": true,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "off"}
              },
              "decimals": 2,
              "min": 0,
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 15},
          "id": 21,
          "options": {
            "legend": {"calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true},
            "tooltip": {"mode": "multi", "sort": "none"}
          },
          "targets": [
            {"expr": "rate(vllm:e2e_request_latency_seconds_count[1m])", "legendFormat": "{{pod}}", "refId": "A"}
          ],
          "title": "Request Completion Rate per Pod",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "description": "EPP 스마트 라우팅의 핵심 증거. KV cache↑ 인 팟의 share↓ 이면 EPP가 정상 동작 중.\n50/50이면 라운드로빈과 다를 바 없음 → EPP 라우팅 효과 없음.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisColorMode": "text",
                "axisLabel": "Share",
                "axisPlacement": "auto",
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": true,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "off"}
              },
              "decimals": 2,
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 15},
          "id": 22,
          "options": {
            "legend": {"calcs": ["lastNotNull"], "displayMode": "table", "placement": "bottom", "showLegend": true},
            "tooltip": {"mode": "multi", "sort": "none"}
          },
          "targets": [
            {
              "expr": "rate(vllm:e2e_request_latency_seconds_count[1m]) / on() group_left() sum(rate(vllm:e2e_request_latency_seconds_count[1m]))",
              "legendFormat": "{{pod}} share",
              "refId": "A"
            }
          ],
          "title": "Request Share per Pod (%)",
          "type": "timeseries"
        }
      ],
      "refresh": "5s",
      "schemaVersion": 38,
      "tags": ["epp", "smart-routing", "ai-gateway"],
      "templating": {
        "list": [
          {"name": "DS_PROMETHEUS", "type": "datasource", "query": "prometheus", "current": {"text": "Prometheus", "value": "prometheus"}}
        ]
      },
      "time": {"from": "now-15m", "to": "now"},
      "title": "EPP Smart Routing",
      "uid": "epp-smart-routing"
    }
