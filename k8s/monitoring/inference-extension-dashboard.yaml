            "defaults": {"color": {"mode": "thresholds"}, "decimals": 1, "unit": "percentunit"},
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 10},
          "id": 12,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.7}, {"color": "red", "value": 0.9}]}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
              "expr": "avg(inference_pool_average_kv_cache_utilization)",
              "refId": "A"
            }
          ],
          "title": "Avg KV Cache Utilization",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "thresholds"}, "decimals": 1, "unit": "short"},
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 10},
          "id": 13,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 10}, {"color": "red", "value": 50}]}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
              "expr": "avg(inference_pool_average_queue_size)",
              "refId": "A"
            }
          ],
          "title": "Avg Queue Size",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "thresholds"}, "decimals": 1, "unit": "percentunit"},
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 10},
          "id": 14,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 0.3}, {"color": "green", "value": 0.5}]}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
              "expr": "avg(inference_pool_prefix_cache_hit_ratio) or vector(0)",
              "refId": "A"
            }
          ],
          "title": "Prefix Cache Hit Ratio",
          "type": "stat"
        },
        {
          "collapsed": false,
