# Inference Extension (EPP) Grafana Dashboard
# AI-specific metrics: TTFT, TPOT, Token Throughput, KV Cache, Queue Size
# Source: https://github.com/kubernetes-sigs/gateway-api-inference-extension

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-inference-extension
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  inference-extension.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
          "id": 1,
          "panels": [],
          "title": "EPP Health",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "thresholds"}, "decimals": 0, "unit": "short"},
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 1},
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
              "expr": "count(up{job=\"epp-metrics\"} == 1)",
              "refId": "A"
            }
          ],
          "title": "EPP Instances (Up)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "Latency",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": true,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "off"}
              },
              "decimals": 4,
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 18, "x": 6, "y": 1},
          "id": 3,
          "options": {
            "legend": {"calcs": ["mean", "max"], "displayMode": "table", "placement": "right", "showLegend": true},
            "tooltip": {"mode": "single", "sort": "none"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
              "expr": "histogram_quantile(0.99, rate(envoy_gateway_epp_scheduler_latency_seconds_bucket[5m]))",
              "legendFormat": "P99",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
              "expr": "histogram_quantile(0.95, rate(envoy_gateway_epp_scheduler_latency_seconds_bucket[5m]))",
              "legendFormat": "P95",
              "refId": "B"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
              "expr": "histogram_quantile(0.50, rate(envoy_gateway_epp_scheduler_latency_seconds_bucket[5m]))",
              "legendFormat": "P50",
              "refId": "C"
            }
          ],
          "title": "Scheduler Latency",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 9},
          "id": 10,
          "panels": [],
          "title": "Inference Pool",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "thresholds"}, "decimals": 0, "unit": "short"},
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 10},
          "id": 11,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 1}, {"color": "green", "value": 2}]}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
              "expr": "inference_pool_ready_pods",
              "refId": "A"
            }
          ],
          "title": "Ready Pods",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
