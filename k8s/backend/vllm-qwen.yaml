# vLLM StatefulSet - Qwen/Qwen3-0.6B
# Apache 2.0 라이선스, HF Token 불필요
# Thinking mode 기본 활성화
# 메트릭: :8000/metrics (기본 활성화)

apiVersion: v1
kind: Service
metadata:
  name: vllm-qwen
  namespace: default
  labels:
    app: vllm-qwen
spec:
  selector:
    app: vllm-qwen
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
  clusterIP: None  # Headless for InferencePool
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vllm-qwen
  namespace: default
  labels:
    app: vllm-qwen
spec:
  serviceName: vllm-qwen
  replicas: 2
  selector:
    matchLabels:
      app: vllm-qwen
  template:
    metadata:
      labels:
        app: vllm-qwen
    spec:
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: "2Gi"
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              vllm serve Qwen/Qwen3-0.6B \
                --host 0.0.0.0 \
                --port 8000 \
                --device cpu \
                --dtype auto \
                --max-model-len 8192
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              memory: "8Gi"
              cpu: "4"
            limits:
              memory: "12Gi"
              cpu: "8"
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
            - name: shm
              mountPath: /dev/shm
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 30
  volumeClaimTemplates:
    - metadata:
        name: model-cache
      spec:
        accessModes: ["ReadWriteOnce"]
        volumeMode: Filesystem
        resources:
          requests:
            storage: 20Gi
